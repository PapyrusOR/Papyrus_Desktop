name: Release with Changelog

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - v2*
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v2.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft'
        default: true
        type: boolean

env:
  APP_NAME: "Papyrus"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows"
            os: windows-latest
            artifact: "Papyrus-Win-x64"
          - platform: "macos"
            os: macos-latest
            artifact: "Papyrus-Apple-Silicon-arm64"
          - platform: "linux"
            os: ubuntu-latest
            artifact: "Papyrus-Linux-x64"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install Dependencies
        run: |
          npm install
          cd frontend && npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Build Python Backend
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pyinstaller PapyrusAPI.spec --clean --distpath dist-python

      - name: Build Electron App
        run: npx electron-builder --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-electron/*
          retention-days: 7

  release:
    name: Create Release with Changelog
    needs: build
    runs-on: ubuntu-latest
    # 暂时禁用自动发布，手动下载 Artifacts
    if: false
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for changelog

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Extract Changelog
        id: changelog
        run: |
          # Get version from tag or input
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if present
          
          echo "Extracting changelog for version: $VERSION"
          
          # Run extraction script
          node scripts/extract-changelog.js "$VERSION" >> $GITHUB_OUTPUT
          
          # Also save to file for debugging
          echo "=== Extracted Changelog ==="
          cat RELEASE_NOTES.md
          echo "==========================="

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: Papyrus-*

      - name: List Artifacts
        run: |
          echo "Build artifacts:"
          find artifacts/ -type f -name "*" | sort

      - name: Determine Release Type
        id: release_type
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          
          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          
          echo "Tag: $TAG"
          echo "Is Prerelease: ${{ steps.release_type.outputs.is_prerelease }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Papyrus-Win-x64/**/*-Setup-*.exe
            artifacts/Papyrus-Apple-Silicon-arm64/**/*.dmg
            artifacts/Papyrus-Apple-Silicon-arm64/**/*.zip
            artifacts/Papyrus-Linux-x64/**/*.AppImage
            artifacts/Papyrus-Linux-x64/**/*.deb
            artifacts/Papyrus-Linux-x64/**/*.tar.gz
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: ${{ github.event.inputs.draft != 'false' }}
          prerelease: ${{ steps.release_type.outputs.is_prerelease == 'true' }}
          generate_release_notes: false  # We use our own changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Changelog as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
