name: Release with Changelog

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - v2
      - v2-develop
      - v2.0.0beta*
      - 'v2*'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v2.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft'
        default: true
        type: boolean

env:
  APP_NAME: "Papyrus"
  # 使用 Node.js 24，避免 Node.js 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Electron Builder 二进制工具镜像（签名工具等）
  ELECTRON_BUILDER_BINARIES_MIRROR: "https://npmmirror.com/mirrors/electron-builder-binaries/"
  # Electron 镜像
  ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows"
            os: windows-latest
            artifact: "Papyrus-Win-x64"
          - platform: "macos"
            os: macos-latest
            artifact: "Papyrus-Apple-Silicon-arm64"
          - platform: "linux"
            os: ubuntu-latest
            artifact: "Papyrus-Linux-x64"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install Node Dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip wheel
          pip install pytest pytest-asyncio httpx pyinstaller
          pip install -r requirements.txt

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Run Tests & Verify Accuracy
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          echo "Running tests with PYTHONPATH=$PYTHONPATH:src"
          PYTHONPATH=src python scripts/verify-tests.py

      - name: Cache PyInstaller
        uses: actions/cache@v4
        with:
          path: |
            build
            *.pyc
          key: pyinstaller-${{ matrix.platform }}-${{ hashFiles('requirements.txt', 'PapyrusAPI.spec') }}
          restore-keys: |
            pyinstaller-${{ matrix.platform }}-

      - name: Build Python Backend
        run: |
          pyinstaller PapyrusAPI.spec --distpath dist-python

      - name: Verify Python Build
        shell: bash
        run: |
          # PyInstaller one-dir mode: executable is in dist-python/Papyrus/
          if [ "${{ matrix.platform }}" = "windows" ]; then
            EXECUTABLE="dist-python/Papyrus/Papyrus.exe"
          else
            EXECUTABLE="dist-python/Papyrus/Papyrus"
          fi
          
          if [ ! -f "$EXECUTABLE" ]; then
            echo "❌ Error: Python executable not found at $EXECUTABLE"
            echo "Contents of dist-python/:"
            ls -la dist-python/ || echo "dist-python directory does not exist"
            ls -la dist-python/Papyrus/ 2>/dev/null || echo "dist-python/Papyrus/ directory does not exist"
            exit 1
          fi
          
          # Check executable exists
          SIZE_MB=$(du -m "$EXECUTABLE" | cut -f1)
          echo "✅ Python executable built: $EXECUTABLE (${SIZE_MB}MB)"
          
          # Check total directory size (one-dir mode: dependencies are in _internal/)
          TOTAL_SIZE=$(du -sm dist-python/Papyrus/ | cut -f1)
          echo "✅ Total directory size: ${TOTAL_SIZE}MB"
          
          # All platforms use one-dir mode, check total size (>25MB is reasonable for minimal build)
          if [ "$TOTAL_SIZE" -lt 25 ]; then
            echo "❌ Error: Build directory too small (${TOTAL_SIZE}MB), may be incomplete"
            exit 1
          fi

      - name: Cache Electron Builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ matrix.platform }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            electron-${{ matrix.platform }}-

      - name: Build Electron App
        run: npx electron-builder --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Electron Build
        shell: bash
        run: |
          RESOURCES_DIR=""
          EXPECTED_FILES=(
            "app.asar"
            "assets/icon.ico"
            "assets/icon.png"
            "certs/root-ca.cer"
          )
          EXPECTED_DIRS=(
            "python/Papyrus/_internal"
          )
          
          # Determine resources directory and platform-specific files
          if [ "${{ matrix.platform }}" = "windows" ]; then
            RESOURCES_DIR="dist-electron/win-unpacked/resources"
            EXPECTED_FILES+=(
              "python/Papyrus/Papyrus.exe"
              "../Papyrus.exe"
              "../chrome_100_percent.pak"
              "../ffmpeg.dll"
            )
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            APP_NAME="dist-electron/mac-arm64/Papyrus.app"
            RESOURCES_DIR="${APP_NAME}/Contents/Resources"
            EXPECTED_FILES+=(
              "python/Papyrus/Papyrus"
              "../MacOS/Papyrus"
            )
          else
            # Linux
            RESOURCES_DIR="dist-electron/linux-unpacked/resources"
            EXPECTED_FILES+=(
              "python/Papyrus/Papyrus"
              "../papyrus"
            )
          fi
          
          echo "=========================================="
          echo "Electron Build Verification"
          echo "=========================================="
          echo "Resources directory: $RESOURCES_DIR"
          
          # Check resources directory exists
          if [ ! -d "$RESOURCES_DIR" ]; then
            echo "❌ Error: Resources directory not found: $RESOURCES_DIR"
            echo "Contents of dist-electron/:"
            find dist-electron/ -type f -name "*" 2>/dev/null | head -30 || echo "dist-electron/ not found"
            exit 1
          fi
          
          echo ""
          echo "📁 Checking required files..."
          echo "------------------------------------------"
          
          # Verify each expected file
          FAILED=0
          for file in "${EXPECTED_FILES[@]}"; do
            FULL_PATH="$RESOURCES_DIR/$file"
            if [ -f "$FULL_PATH" ]; then
              SIZE=$(du -h "$FULL_PATH" 2>/dev/null | cut -f1)
              SIZE_BYTES=$(stat -f%z "$FULL_PATH" 2>/dev/null || stat -c%s "$FULL_PATH" 2>/dev/null || echo "0")
              
              # Check minimum size for critical files
              MIN_SIZE=0
              # Python backend executable in one-dir mode (launcher only, not single-exe)
              if [[ "$file" == python/Papyrus/Papyrus* ]]; then
                MIN_SIZE=5000000  # 5MB for Python backend launcher (one-dir mode)
                if [ "$SIZE_BYTES" -lt "$MIN_SIZE" ]; then
                  echo "❌ $file ($SIZE) - TOO SMALL! Expected >5MB"
                  FAILED=$((FAILED + 1))
                  continue
                fi
              fi
              if [[ "$file" == "app.asar" ]]; then
                MIN_SIZE=1000000  # 1MB for app.asar
                if [ "$SIZE_BYTES" -lt "$MIN_SIZE" ]; then
                  echo "❌ $file ($SIZE) - TOO SMALL! Expected >1MB"
                  FAILED=$((FAILED + 1))
                  continue
                fi
              fi
              
              echo "✅ $file ($SIZE)"
            else
              echo "❌ MISSING: $file"
              FAILED=$((FAILED + 1))
            fi
          done
          
          # Verify expected directories
          echo ""
          echo "📂 Checking required directories..."
          echo "------------------------------------------"
          for dir in "${EXPECTED_DIRS[@]}"; do
            FULL_PATH="$RESOURCES_DIR/$dir"
            if [ -d "$FULL_PATH" ]; then
              FILE_COUNT=$(find "$FULL_PATH" -type f 2>/dev/null | wc -l)
              DIR_SIZE=$(du -sh "$FULL_PATH" 2>/dev/null | cut -f1)
              
              # Check if directory has content
              if [ "$FILE_COUNT" -eq 0 ]; then
                echo "❌ $dir (EMPTY) - Expected files inside"
                FAILED=$((FAILED + 1))
              else
                echo "✅ $dir ($FILE_COUNT files, $DIR_SIZE)"
              fi
            else
              echo "❌ MISSING DIR: $dir"
              FAILED=$((FAILED + 1))
            fi
          done
          
          # Summary
          echo ""
          echo "=========================================="
          if [ $FAILED -gt 0 ]; then
            echo "❌ Error: $FAILED verification(s) failed!"
            echo "=========================================="
            echo ""
            echo "Actual contents of $RESOURCES_DIR:"
            find "$RESOURCES_DIR" -type f 2>/dev/null | head -50
            exit 1
          fi
          
          echo "✅ All files and directories verified!"
          echo "=========================================="
          
          # Print summary of key components
          echo ""
          echo "📊 Build Summary:"
          echo "------------------------------------------"
          PYTHON_EXE="$RESOURCES_DIR/python/Papyrus/Papyrus.exe"
          APP_ASAR="$RESOURCES_DIR/app.asar"
          INTERNAL_DIR="$RESOURCES_DIR/python/Papyrus/_internal"
          
          if [ -f "$PYTHON_EXE" ]; then
            echo "Python Backend: $(du -h "$PYTHON_EXE" | cut -f1)"
          fi
          if [ -d "$INTERNAL_DIR" ]; then
            echo "Python Dependencies: $(find "$INTERNAL_DIR" -name "*.pyd" -o -name "*.dll" | wc -l) native modules"
          fi
          if [ -f "$APP_ASAR" ]; then
            echo "App Bundle: $(du -h "$APP_ASAR" | cut -f1)"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-electron/*
          retention-days: 7

  release:
    name: Create Release with Changelog
    needs: build
    runs-on: ubuntu-latest
    # 发布 job - 仅在打标签时启用
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for changelog

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Extract Changelog
        id: changelog
        run: |
          # Get version from tag or input
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if present
          
          echo "Extracting changelog for version: $VERSION"
          
          # Run extraction script
          node scripts/extract-changelog.js "$VERSION" >> $GITHUB_OUTPUT
          
          # Also save to file for debugging
          echo "=== Extracted Changelog ==="
          cat RELEASE_NOTES.md
          echo "==========================="

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: Papyrus-*

      - name: List Artifacts
        run: |
          echo "Build artifacts:"
          find artifacts/ -type f -name "*" | sort

      - name: Determine Release Type
        id: release_type
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          
          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          
          echo "Tag: $TAG"
          echo "Is Prerelease: ${{ steps.release_type.outputs.is_prerelease }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Papyrus-Win-x64/**/*-Setup-*.exe
            artifacts/Papyrus-Apple-Silicon-arm64/**/*.dmg
            artifacts/Papyrus-Apple-Silicon-arm64/**/*.zip
            artifacts/Papyrus-Linux-x64/**/*.AppImage
            artifacts/Papyrus-Linux-x64/**/*.deb
            artifacts/Papyrus-Linux-x64/**/*.tar.gz
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: ${{ github.event.inputs.draft != 'false' }}
          prerelease: ${{ steps.release_type.outputs.is_prerelease == 'true' }}
          generate_release_notes: false  # We use our own changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Changelog as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
