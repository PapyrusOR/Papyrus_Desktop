name: Build and Release

on:
  push:
    branches:
      - main
      - develop
      - 'TS后端重写'
      - 'v2.0.0beta.3'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub draft release'
        required: false
        default: false
        type: boolean
      tag:
        description: 'Release tag (e.g. v2.0.0)'
        required: false
        type: string

env:
  APP_NAME: "Papyrus"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ELECTRON_BUILDER_BINARIES_MIRROR: "https://npmmirror.com/mirrors/electron-builder-binaries/"
  ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows"
            target: "win"
            os: windows-latest
            artifact: "Papyrus-Win-x64"
          - platform: "macos"
            target: "mac"
            os: macos-latest
            artifact: "Papyrus-Apple-Silicon-arm64"
          - platform: "linux"
            target: "linux"
            os: ubuntu-latest
            artifact: "Papyrus-Linux-x64"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install Root Dependencies
        run: npm ci --ignore-scripts

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Audit Production Dependencies
        shell: bash
        run: |
          echo "=== Frontend production audit ==="
          (cd frontend && npm audit --omit=dev --audit-level=high)
          echo "=== Backend production audit ==="
          (cd backend && npm audit --omit=dev --audit-level=high)
          echo "Production dependency audit passed."

      - name: Typecheck Backend
        working-directory: backend
        run: npm run typecheck

      - name: Test Backend
        working-directory: backend
        shell: bash
        run: |
          npm test -- --verbose 2>&1 | tee test-output.log
          TEST_EXIT=${PIPESTATUS[0]}
          if [ $TEST_EXIT -ne 0 ]; then
            echo "Tests failed with exit code $TEST_EXIT"
            exit $TEST_EXIT
          fi

      - name: Upload Test Output on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.platform }}
          path: backend/test-output.log
          retention-days: 1

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Build Backend
        working-directory: backend
        run: npm run build

      - name: Prune Backend Dependencies
        working-directory: backend
        run: npm prune --production

      - name: Verify Backend Build
        shell: bash
        run: |
          SERVER_JS="backend/dist/api/server.js"
          if [ ! -f "$SERVER_JS" ]; then
            echo "Error: Backend entry not found at $SERVER_JS"
            exit 1
          fi
          SIZE=$(du -h "$SERVER_JS" | cut -f1)
          echo "Backend entry built: $SERVER_JS ($SIZE)"

      - name: Verify Frontend Build
        shell: bash
        run: |
          INDEX_HTML="frontend/dist/index.html"
          if [ ! -f "$INDEX_HTML" ]; then
            echo "Error: Frontend index.html not found"
            exit 1
          fi
          echo "Frontend built successfully"

      - name: Cache Electron Builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ matrix.platform }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ matrix.platform }}-

      # macOS signing: uncomment the env block below and set the secrets when an Apple Developer ID is available.
      #   CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
      - name: Build Electron App
        run: npx electron-builder --${{ matrix.target }} --publish=never --config .electron-builder.config.js

      - name: Verify Electron Build
        shell: bash
        run: |
          echo "Build outputs:"
          find dist-electron/ -maxdepth 1 -type f | sort

          # Verify the expected installer/package exists
          case "${{ matrix.platform }}" in
            windows)
              if [ -z "$(ls dist-electron/*-Setup-*.exe 2>/dev/null)" ]; then
                echo "Error: No Windows installer found"
                exit 1
              fi
              ;;
            macos)
              if [ -z "$(ls dist-electron/*.dmg 2>/dev/null)" ]; then
                echo "Error: No macOS dmg found"
                exit 1
              fi
              ;;
            linux)
              if [ -z "$(ls dist-electron/*.AppImage 2>/dev/null)" ] && [ -z "$(ls dist-electron/*.deb 2>/dev/null)" ]; then
                echo "Error: No Linux package found"
                exit 1
              fi
              ;;
          esac
          echo "Build verification passed"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist-electron/*-Setup-*.exe
            dist-electron/*.dmg
            dist-electron/*.AppImage
            dist-electron/*.deb
          if-no-files-found: warn
          retention-days: 7

  generate-notes:
    name: Generate Release Notes
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate Release Notes
        run: |
          node scripts/generate-release-notes.js origin/main HEAD
          echo ""
          echo "=== Generated Release Notes ==="
          cat RELEASE_NOTES.md
          echo "==============================="

      - name: Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          retention-days: 7

  # ------------------------------------------------------------------
  # Release job: disabled by default. Enable manually via workflow_dispatch
  # with create_release=true when ready to publish.
  # ------------------------------------------------------------------
  release:
    name: Create Draft Release
    needs: [build, generate-notes]
    runs-on: ubuntu-latest
    if: github.event.inputs.create_release == 'true' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: Papyrus-*

      - name: Download Release Notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Prepare Release Notes
        shell: bash
        run: |
          cp RELEASE_NOTES.md CHANGELOG_SECTION.md
          echo "=== Final release body ==="
          cat CHANGELOG_SECTION.md
          echo "=========================="

      - name: List Artifacts
        run: |
          echo "Build artifacts:"
          find artifacts/ -type f | sort

      - name: Determine Release Type
        id: release_type
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Papyrus-Win-x64/**/*-Setup-*.exe
            artifacts/Papyrus-Apple-Silicon-arm64/**/*.dmg
            artifacts/Papyrus-Linux-x64/**/*.AppImage
            artifacts/Papyrus-Linux-x64/**/*.deb
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: CHANGELOG_SECTION.md
          draft: true
          prerelease: ${{ steps.release_type.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
