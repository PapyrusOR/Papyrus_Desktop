name: Smart Build & Conditional Release
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

env:
  APP_NAME: "Papyrus"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # 只保留两个平台
          - platform: "Windows x86_64"
            os: windows-latest
            artifact_name: "windows-x86_64"
          - platform: "macOS Apple Silicon"
            os: macos-latest  # 默认是 ARM64 (M1/M2/M3)
            artifact_name: "macos-arm64"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 获取最近两次提交，用于检测文件变化

      # 检测本次提交是否修改了 src/ 目录
      - name: Check if src/ was modified
        id: check_src
        run: |
          # 检查是否有前一次提交（避免第一次提交时出错）
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            if git diff --name-only HEAD~1 HEAD | grep -q '^src/'; then
              echo "src_changed=true" >> $GITHUB_OUTPUT
              echo "✅ src/ directory was modified"
            else
              echo "src_changed=false" >> $GITHUB_OUTPUT
              echo "ℹ️ src/ directory was NOT modified"
            fi
          else
            # 第一次提交，默认认为有变化
            echo "src_changed=true" >> $GITHUB_OUTPUT
            echo "✅ First commit, treating as src/ modified"
          fi
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

            - name: Build Application
        run: |
          pyinstaller Papyrus.spec
        shell: bash

      # 总是上传到 Artifacts（无论是否修改了 src/）
      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

      # 将检测结果传递给下一个 job
      - name: Save src change status
        run: echo "${{ steps.check_src.outputs.src_changed }}" > src_status.txt
        shell: bash

      - name: Upload src status
        uses: actions/upload-artifact@v4
        with:
          name: src-status-${{ matrix.artifact_name }}
          path: src_status.txt

  # 只有当 src/ 被修改时，才执行这个 release 任务
  release:
    name: Publish to Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 下载所有构建产物
      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 检查是否有任何一个平台检测到 src/ 变化
      - name: Check if should release
        id: should_release
        run: |
          # 检查任意一个 src_status.txt 文件内容是否为 true
          if grep -q "true" artifacts/src-status-*/src_status.txt 2>/dev/null; then
            echo "release=true" >> $GITHUB_OUTPUT
            echo "✅ Will create release (src/ was modified)"
          else
            echo "release=false" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping release (src/ was not modified)"
          fi
        shell: bash

      - name: Generate Version Tag
        if: steps.should_release.outputs.release == 'true'
        id: version
        run: echo "tag=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      # 只有当 src/ 被修改时才创建 Release
      - name: Create GitHub Release
        if: steps.should_release.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            🚀 **自动发布** - src/ 目录有更新
            
            **支持平台：**
            - ✅ Windows x86_64
            - ✅ macOS Apple Silicon (M1/M2/M3)
            
            **下载说明：**
            选择对应平台的文件下载即可直接运行
          files: |
            artifacts/windows-x86_64/*
            artifacts/macos-arm64/*
          draft: false
          prerelease: false  # 改为正式版本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 如果没有修改 src/，输出提示信息
      - name: Skip Release Notice
        if: steps.should_release.outputs.release == 'false'
        run: |
          echo "ℹ️ Release skipped because src/ directory was not modified."
          echo "📦 Build artifacts are available in the Actions tab."