name: Build and Release (Optimized)

# ==================================================================
# 使用说明
# ==================================================================
# 本工作流用于构建 Papyrus 桌面应用并发布 GitHub Release。
#
# 【触发方式】
# 1. 自动触发：push 代码到 release、BA* 分支时执行构建校验，
#    push v* 开头的 tag（如 v2.0.0）时构建并发布 Release。
# 2. 手动触发：进入 Actions → Build and Release (Optimized) → Run workflow，并填写发布 tag。
#
# 【优化说明】
# - 使用 actions/setup-node 内置缓存替代手动缓存
# - 更细粒度的缓存策略
# - 并行 typecheck
# - 优化的 npm 配置
# - prepare-release 快速创建空 Release，build 谁先完谁先传
# - 并行生成 Release Notes，最后更新 Release
# ==================================================================

on:
  push:
    branches:
      - 'release'
      - 'release/**'
      - 'BA*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean

env:
  APP_NAME: "Papyrus Desktop"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # GitHub Actions runners在国外，不使用国内镜像
  # 优化 npm 配置
  NPM_CONFIG_CACHE: /tmp/npm-cache
  NPM_CONFIG_FUND: false
  NPM_CONFIG_AUDIT: false
  NPM_CONFIG_PREFER_OFFLINE: true
  NPM_CONFIG_ENGINE_STRICT: false
  NPM_CONFIG_LOGLEVEL: error
  NPM_CONFIG_PROGRESS: false
  # Electron builder 优化
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.prepare.outputs.tag_name }}
      is_draft: ${{ steps.prepare.outputs.is_draft }}
      is_prerelease: ${{ steps.prepare.outputs.is_prerelease }}
      should_release: ${{ steps.prepare.outputs.should_release }}
    steps:
      - name: Prepare Release Info
        id: prepare
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if [ -z "$TAG" ]; then
              echo "Manual release requires a tag input"
              exit 1
            fi
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT
          
          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_draft=${{ github.event.inputs.draft }}" >> $GITHUB_OUTPUT
          else
            echo "is_draft=true" >> $GITHUB_OUTPUT
          fi
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref_type }}" = "tag" ]; then
              # tag 推送始终发布
              echo "should_release=true" >> $GITHUB_OUTPUT
            else
              # 分支提交只做构建校验，不发布 release
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi
      - name: Create Empty Release
        if: steps.prepare.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.prepare.outputs.tag_name }}
          name: ${{ steps.prepare.outputs.tag_name }}
          draft: ${{ steps.prepare.outputs.is_draft == 'true' }}
          prerelease: ${{ steps.prepare.outputs.is_prerelease == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: [prepare-release]
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows"
            target: "win"
            os: windows-2025-vs2026
          - platform: "macos"
            target: "mac"
            os: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Cache Electron & Builder Binaries
        uses: actions/cache@v5.0.5
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: eb-${{ runner.os }}-${{ hashFiles('.electron-builder.config.js') }}
          restore-keys: |
            eb-${{ runner.os }}-

      - name: Install Dependencies
        shell: bash
        run: |
          echo "Installing dependencies with npm cache..."
          npm ci --ignore-scripts --no-audit --no-fund --prefer-offline &
          (cd frontend && npm ci --ignore-scripts --no-audit --no-fund --prefer-offline) &
          (cd backend && npm ci --ignore-scripts --no-audit --no-fund --prefer-offline) &
          wait

      - name: Cache Frontend Build
        id: cache-frontend-build
        uses: actions/cache@v5.0.5
        with:
          path: frontend/dist
          key: build-frontend-${{ hashFiles('frontend/src/**', 'frontend/package.json', 'frontend/vite.config.js', 'frontend/tailwind.config.js', 'frontend/postcss.config.js', 'frontend/index.html') }}
          restore-keys: |
            build-frontend-${{ runner.os }}-
            build-frontend-

      - name: Cache Backend Build
        id: cache-backend-build
        uses: actions/cache@v5.0.5
        with:
          path: backend/dist
          key: build-backend-${{ hashFiles('backend/src/**', 'backend/package.json', 'backend/tsconfig.json') }}
          restore-keys: |
            build-backend-${{ runner.os }}-
            build-backend-



      - name: Build Frontend and Backend (Parallel)
        shell: bash
        run: |
          echo "Starting parallel builds..."
          if [ "${{ steps.cache-frontend-build.outputs.cache-hit }}" != "true" ]; then
            (cd frontend && npm run build) &
          fi
          if [ "${{ steps.cache-backend-build.outputs.cache-hit }}" != "true" ]; then
            (cd backend && npm run build) &
          fi
          wait

      - name: Prune Backend Dependencies
        working-directory: backend
        shell: bash
        run: |
          echo "Pruning backend dependencies..."
          # 直接跳过rebuild，项目中没有native modules需要重新编译
          npm prune --production

      - name: Build Electron App
        shell: bash
        run: |
          echo "Building Electron app for ${{ matrix.platform }}..."
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          export ELECTRON_SKIP_BINARY_DOWNLOAD=1
          export ELECTRON_BUILDER_USE_CACHE=true
          # GitHub Actions 在国外，不需要用国内镜像
          # export ELECTRON_MIRROR=https://npmmirror.com/mirrors/electron/
          # export ELECTRON_BUILDER_BINARIES_MIRROR=https://npmmirror.com/mirrors/electron-builder-binaries/
          npx electron-builder --${{ matrix.target }} --publish=never --config .electron-builder.config.js

      - name: Verify Electron Build
        shell: bash
        run: |
          echo "Build outputs:"
          find dist-electron/ -maxdepth 1 -type f | sort

          MIN_SIZE=52428800
          case "${{ matrix.platform }}" in
            windows)
              INSTALLER=$(ls dist-electron/*-Setup.exe 2>/dev/null | head -1)
              ;;
            macos)
              INSTALLER=$(ls dist-electron/*.dmg 2>/dev/null | head -1)
              ;;
          esac

          for ARTIFACT in "$INSTALLER"; do
            if [ -n "$ARTIFACT" ] && [ -f "$ARTIFACT" ]; then
              SIZE_BYTES=$(wc -c < "$ARTIFACT")
              SIZE_MB=$((SIZE_BYTES / 1048576))
              if [ "$SIZE_BYTES" -lt "$MIN_SIZE" ]; then
                echo "Error: Artifact suspiciously small (${SIZE_MB}MB): $ARTIFACT"
                exit 1
              fi
              echo "Artifact OK: $ARTIFACT (${SIZE_MB}MB)"
            fi
          done

          echo "Build verification passed"

      - name: Verify Packaged Dependencies
        run: node scripts/verify-packaged-deps.js

      - name: Clean Up Unpacked Directories
        shell: bash
        run: |
          echo "Cleaning up unpacked directories..."
          rm -rf dist-electron/*-unpacked 2>/dev/null || true
          rm -rf dist-electron/linux-* 2>/dev/null || true
          echo "Cleanup completed"

      - name: Find Artifacts
        id: find-artifacts
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            EXE=$(ls dist-electron/*-Setup.exe 2>/dev/null | head -1)
            if [ -n "$EXE" ]; then
              echo "exe_path=$EXE" >> $GITHUB_OUTPUT
              echo "exe_name=$(basename "$EXE")" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            DMG=$(ls dist-electron/*.dmg 2>/dev/null | head -1)
            if [ -n "$DMG" ]; then
              echo "dmg_path=$DMG" >> $GITHUB_OUTPUT
              echo "dmg_name=$(basename "$DMG")" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Upload Windows EXE (Artifact)
        if: matrix.platform == 'windows' && steps.find-artifacts.outputs.exe_path
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.find-artifacts.outputs.exe_name }}
          path: ${{ steps.find-artifacts.outputs.exe_path }}
          if-no-files-found: warn
          retention-days: 7
          archive: false

      - name: Upload macOS DMG (Artifact)
        if: matrix.platform == 'macos' && steps.find-artifacts.outputs.dmg_path
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.find-artifacts.outputs.dmg_name }}
          path: ${{ steps.find-artifacts.outputs.dmg_path }}
          if-no-files-found: warn
          retention-days: 7
          archive: false

      - name: Upload Release Asset
        if: needs.prepare-release.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist-electron/*-Setup.exe
            dist-electron/*.dmg
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-release-notes:
    name: Update Release Notes
    runs-on: ubuntu-latest
    needs: [prepare-release, test, security]
    if: needs.prepare-release.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json
      - name: Generate and Update Release Notes
        run: |
          node scripts/generate-release-notes.js origin/main HEAD
      - name: Update Release with Notes
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          body_path: RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Run Tests &amp; Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'test') || contains(github.event.pull_request.labels.*.name, 'typecheck')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install Dependencies
        shell: bash
        run: |
          echo "Installing dependencies with npm cache..."
          npm ci --ignore-scripts --no-audit --no-fund --prefer-offline &
          (cd frontend && npm ci --ignore-scripts --no-audit --no-fund --prefer-offline) &
          (cd backend && npm ci --ignore-scripts --no-audit --no-fund --prefer-offline) &
          wait

      - name: Run Typechecks (Parallel)
        shell: bash
        run: |
          echo "Running typechecks in parallel..."
          (cd frontend && npm run typecheck) &
          (cd backend && npm run typecheck) &
          wait

      - name: Run Backend Tests
        working-directory: backend
        shell: bash
        run: |
          npm test -- --verbose 2>&1 | tee test-output.log
          TEST_EXIT=${PIPESTATUS[0]}
          if [ $TEST_EXIT -ne 0 ]; then
            echo "Tests failed with exit code $TEST_EXIT"
            exit $TEST_EXIT
          fi

      - name: Upload Test Output on Failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-output
          path: backend/test-output.log
          retention-days: 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'security')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Run npm audit (Root)
        run: npm audit --audit-level=moderate

      - name: Run npm audit (Backend)
        working-directory: backend
        run: npm audit --audit-level=moderate

      - name: Run npm audit (Frontend)
        working-directory: frontend
        run: npm audit --audit-level=moderate
