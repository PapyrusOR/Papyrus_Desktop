name: Electron Build & Release

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - v2*
      - feature/*
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
      create_release:
        description: 'Create release'
        required: true
        default: false
        type: boolean
      include_python:
        description: 'Include Python backend (bigger size)'
        required: true
        default: false
        type: boolean
      tag:
        description: 'Tag name for release (e.g., v2.0.0-beta.1)'
        required: false
        default: ''

env:
  APP_NAME: "Papyrus"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows"
            os: windows-latest
            arch: x64
            artifact_name: "Papyrus-Win-x64"
            ext: ".exe"
            setup_pattern: "*-Setup-*.exe"
          - platform: "macos"
            os: macos-latest
            arch: arm64
            artifact_name: "Papyrus-Apple Silicon-arm64"
            ext: ".app"
          - platform: "linux"
            os: ubuntu-latest
            arch: x64
            artifact_name: "Papyrus-Linux-x64"
            ext: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install Dependencies
        run: |
          npm install
          cd frontend && npm install 

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Build Python Backend
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pyinstaller PapyrusAPI.spec --clean

      - name: Build Electron App
        run: |
          npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-electron/*
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # 暂时禁用发布，需要时手动开启
    if: false
    # if: |
    #   startsWith(github.ref, 'refs/tags/v') || 
    #   (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    permissions:
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: Papyrus-*

      - name: List Artifacts
        run: |
          echo "Build artifacts:"
          ls -la artifacts/
          find artifacts/ -type f -name "*" | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Papyrus-Win-x64/**/*-Setup-*.exe
            artifacts/Papyrus-Apple Silicon-arm64/**/*.dmg
            artifacts/Papyrus-Linux-x64/**/*.AppImage
            artifacts/Papyrus-Linux-x64/**/*.deb
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.event.inputs.tag, 'alpha') || contains(github.event.inputs.tag, 'beta') || contains(github.event.inputs.tag, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
