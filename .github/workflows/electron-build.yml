name: Electron Build & Release

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - v2*
      - feature/*
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'v2.0.0beta1：UI重写测试1'

env:
  APP_NAME: "Papyrus"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows"
            os: windows-latest
            arch: x64
            artifact_name: "Papyrus-Win-x64"
            ext: ".exe"
            setup_pattern: "*-Setup-*.exe"
          - platform: "macos"
            os: macos-latest
            arch: arm64
            artifact_name: "Papyrus-Apple Silicon-arm64"
            ext: ".app"
          - platform: "linux"
            os: ubuntu-latest
            arch: x64
            artifact_name: "Papyrus-Linux-x64"
            ext: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4.3.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install Dependencies
        run: |
          npm install
          cd frontend && npm install 

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Build Electron App
        run: |
          npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-electron/*
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          path: artifacts
          pattern: Papyrus-*

      - name: List Artifacts
        run: |
          echo "Build artifacts:"
          ls -la artifacts/
          find artifacts/ -type f -name "*" | head -20

      - name: Create Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          files: |
            artifacts/Papyrus-Win-x64/**/*-Setup-*.exe
            artifacts/Papyrus-Apple Silicon-arm64/**/*.dmg
            artifacts/Papyrus-Linux-x64/**/*.AppImage
            artifacts/Papyrus-Linux-x64/**/*.deb
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
